## İstatistiksel Çıkarım

- Davranış bilimlerinde, **küçük bir grup üzerinde yürütülen araştırmalar**, bu grupta yer alan bireylerin davranışlarından yola çıkılarak ilgilenilen **daha büyük gruplara genellemeler yapılır. **

- Evrenden bir örneklemin **tesadüfi olarak seçilmesi,** örneklemden hareketle genellemelere varmak için yapılacak ilk işlemdir.

- küçük bir örneklemi yansıtan **sınırlı bir bilgi, gözlem ya da veriyi kullanarak kendileri, diğer insanlar veya çevrelerindeki olaylar hakkında çıkarımlarda bulunmasıdır.** Yapılan **çıkarımlar bazen geçerli iken; kimi zaman yanlış olabilir (Shavelson vd., 1977).**

---


## İstatistiksel Çıkarım

- **Örneklem istatistikleri** **evren parametreleri** hakkında bilmek istediklerimize ilişkin önemli bilgiler sağlar. 

- Ayrıca **bazı kestiriciler diğerlerine göre daha fazla bilgi verir.** 

- Açıkça görülmektedir ki **tek bir örneklemden elde edilen verilere dayalı olarak yapılan kestirimlerin bir miktar hata içermesi kaçınılmazdır.** 

- Bu **hata sorunu istatistiksel çıkarımın temel problemidir.** 

- İstatistiksel çıkarımların bu problemin üstesinden nasıl geldiğini anlatırken, **hipotez testleri yaklaşımı dikkate alınmaktadır.**

---
## İstatistiksel Çıkarım

- Slippery Rock olarak adlandırılan yeni bir sabun hakkında yapılan pazar çalışması için **tesadüfi olarak 500 ev seçilmiştir.** Belirlenen evlere telefonla ulaşılıp, evdeki yetişkinlerden biri ile sabun hakkında telefonla görüşme yapılmıştır. Görüşülen kişiler, 0 ile 10 arasında derecelendirmeye sahip bir ölçek kullanarak sabunu puanlamıştır. Puanlama sonucunda, **örneklem ortalaması 6.9 ve standart sapması 0.90** olarak bulunmuştur. Çok sayıda katılımcı üzerinde yapılan önceki araştırmalar, diğer sabunlara ilişkin **ortalamanın 7.4** olduğunu göstermektedir. Araştırmacı, **Slippery Rock sabununun diğer sabunlara ilişkin görüşlerden farklılık gösterip göstermediğini test etmek istemektedir.** 


---
## İstatistiksel Çıkarım

- Davranış bilimlerinde istatistiksel çıkarımlar, evren hakkında sıklıkla sorulan iki sorunun cevaplanmasına yardımcı olur.

  - **Durum I:** Belirli bir örneklem, hipotez edilen evrene mi aittir?

  - **Durum II:** İki farklı gruptan elde edilen gözlemler birbirinden farklılık göstermekte midir? Diğer bir ifadeyle; iki gözlem seti, eş evrenden alınan örneklemleri mi yoksa farklı evrenlerden gelen örneklemleri mi temsil etmektedir?

---
## Durum I

- Araştırmacı, **örneklem verilerinin hipotez edilen evrenden gelip gelmediğini** belirlemeye çalışır. 

- Örneğin, **genel evrende zekâya ilişkin ortalama puanının 100 olduğunu kabul edelim.** 

- Bir psikolog, **kliniğine gelen danışanlarının IQ ortalamalarının 100’e eşit olup olmadığını merak edebilir.**

- Bu amaçla kliniğe gelen danışanlarından **tesadüfi olarak seçilen bir gruba (örneklem) zekâ testi uygular.**  Gruba dâhil edilen bireylerin **zekâ puanlarının ortalaması hesaplanır** ve **hesaplanan ortalama evren parametrelerini kestirmek için kullanılır. **


---
## Durum I

- Durum I’de araştırmacı, **belirli bir evrene ilişkin hipotezler kurar (örneğin; genel evrende zekâ puanı ortalamasının 100 olduğu). **

- Evrene ilişkin bu hipotezler, **önceki araştırmaların bulgularına, konu ile ilgili kuramsal bilgilere ya da araştırmacının evrenin doğası hakkındaki önsezilerine dayanır.** 

- Bir **örneklem tesadüfi olarak seçilir.** Bu örnekleme ait veriler kullanılarak, **örneklemin hipotez edilen evrenden mi yoksa alternatif başka evrenlerden mi geldiği sorusuna yanıt aranır.**



---
## Durum II

- **İki farklı gruptan gelen gözlemler birbirinden farklılık göstermekte midir?** sorusuna yanıt aranır.

- Bu amaçla, iki farklı gözlem seti oluşturulur. Buradaki problem, **iki grubun eş evrenden gelen örneklemleri mi; yoksa farklı evrenlerden gelen örneklemleri mi temsil ettiğidir.**

- **kelimelerin sunuluş biçiminin hatırlama üzerindeki etkisinin** incelendiği deneysel bir çalışmayı ele alalım. Çalışmaya katılan bireyler tesadüfi olarak deney ve kontrol gruplarına atanmıştır. **Deney grubundaki bireylere metin ile ilgili birimler mantıksal bir sırayla; kontrol grubundaki bireylere ise karıştırılmış bir biçimde sunulmuştur.** Metin okunduktan sonra hem deney hem de kontrol grubundaki bireylerin **metni ne düzeyde hatırladıkları test edilmiştir.**

---
## Durum II

-   Bireyler **metni okuduktan sonra, deney ve kontrol gruplarının ortalamaları benzer ise iki grubun aynı evrenleri temsil etmeye devam ettiği şeklinde bir çıkarımda bulunulabilir**. 

- Bu çıkarım, **deneysel işlemin metnin hatırlanması üzerinde bir etki yaratmadığı anlamına gelmektedir.** 

- Eğer deneysel işlemin ardından deney ve kontrol grubunda yer alan bireylerin **ortalamaları arasında önemli bir fark bulunursa, grupların farklı ortalamalara sahip olan evrenlerden gelen örneklemleri temsil ettiği çıkarımında bulunulabilir. Bu durum ise deneysel işlemin bir etkisinin olduğunu ifade eder.**

---
## Durum I: Örneklem hipotez edilen evrene ait midir?

.pull-left[
.small[


- Örneğin Amerika’daki bir eyalette, eğitimden sorumlu bakanlığın, **eyaletteki lise son sınıf öğrencilerinin (tüm evren) ortalama okuma düzeyini belirlemek istediğini varsayalım.**

- Ancak eyaletteki tüm lise son sınıf öğrencilerinin okuma seviyelerinin test edilmesi oldukça maliyetli ve zor olacağından, **tesadüfi olarak seçilen öğrencilerden oluşan bir örnekleme bahar döneminde bir test uygulanır**. Bu örneklemin test puanlarından, örneklem puanları dağılımının ortalaması hesaplanır ( `\(\overline{X} = 8.20\)`)
]
]
--

.pull-right[
.small[

- Ulusal test normlarına göre, eyalette yapılan uygulamada kullanılan test ile ABD’nin genelinde kullanılan testin eş değer olması durumunda, ABD’deki lise son sınıf öğrencilerinin okuma düzeylerine **ilişkin ortalamanın 7.89 olduğunu biliniyor olsun.** Bu durumda ilgilenilecek soru, **Ortalaması 7.89 olan evrenden seçilen bir örneklemin, ortalamasının 8.20 ya da daha yüksek olma olasılığı nedir?**
]
]

---
## Durum I: Örneklem hipotez edilen evrene ait midir?

- Örneklem ortalamasının bilinen ya da beklenen bir değerden farklılık gösterip göstermediği konusunda karara ulaşmak için şu strateji kullanılır. Test edilecek hipotez ortaya konur. Bu hipotez yokluk hipotezi olarak adlandırılır ve `\(H_0\)` şeklinde gösterilir. 

- Buradaki örnek için `\(H_0: \mu = 7.89\)`  olacaktır.

  1. Evren değeri belirli bir değere eşit değildir ( `\(H_1: \mu \neq 7.89\)` ). Bu şekilde kurulan bir alternatif hipotez, **çift yönlü alternatif hipotez olarak tanımlanır.**
  2. Evren ortalaması belirli bir değerden daha küçüktür ( `\(H_1: μ &lt; 7.89\)`)
  3. Evren ortalaması belirli bir değerden daha büyüktür ( `\(H_1: μ &gt; 7.89\)`).


---
## Durum II: kelimelerin sunuluş biçiminin hatırlama üzerindeki etkisi

- Araştırmada, lise ikinci sınıfa devam eden 100 öğrenci tesadüfi olarak belirlenmiştir 
  - Yine tesadüfi olarak, bu öğrencilerin yarısı deney grubuna (nD = 50), 
  diğer yarısı da kontrol grubuna (nK = 50) atanmıştır. 

-  deney ve kontrol grubundaki lise ikinci sınıf öğrencileri deneyin başında eşdeğer bir biçimde yer almıştır.

- Deney grubunda, kelimeler kendi hiyerarşik düzeni içinde sunulurken; kontrol grubunda kelimeler karışık bir biçimde sunulmuştur. 

- deney grubundaki öğrencilerin hatırladığı kelime sayısı ortalaması, kontrol grubundaki öğrencilere göre daha fazladır.

---
## Durum II: kelimelerin sunuluş biçiminin hatırlama üzerindeki etkisi

1. İki grup, **aynı ortalamaya sahip evrenleri temsil etmektedir.** Bu durumda, kelimelerin **sunuluş biçiminin hatırlama üzerinde bir etkisinin olmadığı** şeklinde bir çıkarım yapılır.

2. **İki grup, farklı ortalamalara sahip evrenleri temsil etmektedir.** Bir başka deyişle, **iki grubun sunulan kelimeleri hatırlama düzeyleri arasında fark vardır.**

---
## Durum II: kelimelerin sunuluş biçiminin hatırlama üzerindeki etkisi

- Deney ve kontrol grupları örneklem dağılımları **arasındaki fark, şanstan dolayı oluşabiliyorsa, iki grubun aynı evrenden geldiği ve uygulanan deneysel işlemin bir etkisinin olmadığı şeklinde bir çıkarım yapılır.**

- Eğer fark şanstan dolayı oluşmamışsa, örneklemlerin farklı evrenleri temsil ettiğine ve deneysel işlemin hatırlama üzerinde etkisinin olduğuna karar verilir. Burada, örneklemden evrene/evrenlere yapılan çıkarımlar ile karara varılmaktadır.

- **Örneklem ortalamaları arasında görülen fark, şanstan mı; yoksa deneysel işlem sonrasında deney ve kontrol gruplarının farklı ortalamalara sahip evrenleri temsil etmesinden mi kaynaklanmaktadır?**

---
## Durum II: kelimelerin sunuluş biçiminin hatırlama üzerindeki etkisi

- Yokluk hipotezi `\(H_0: \mu_d = \mu_k\)` biçiminde gösterilir. 
- Ya da sözel olarak, yokluk hipotezine göre deney grubunun ortalaması kontrol grubunun ortalamasına eşittir denilebilir.
.
- `\(H_1: \mu_d \neq \mu_k\)` =&gt; Deney grubunun ortalaması kontrol grubunun ortalamasına eşit değildir
- `\(H_1: \mu_d &gt; \mu_k\)` =&gt; Deney grubunun ortalaması kontrol grubunun ortalamasından yüksektir.
- `\(H_1: \mu_d &lt; \mu_k\)` =&gt;  Deney grubunun ortalaması kontrol grubunun ortalamasından düşüktür.



---

## İSTATİSTİKSEL ÇIKARIMDA HATA


1. Yokluk hipotezi doğru olduğu halde reddedilmesi yönünde bir karar verilmiş olabilir. Bu durumda, iki örneklem eş evrenleri temsil etmesine rağmen, grupların farklı evrenleri temsil ettiği yönünde bir karar alınması söz konusudur.
2. İkinci hata ise, yokluk hipotezi yanlış olduğu halde kabul edilmesi sonucu ortaya çıkar. Bu durumda, iki grup farklı evrenlerden gelmesine karşın grupların eş evrenlerden geldiği şeklinde yanlış bir karar alınmış olur.




|  Karar                        | Evrendeki Gerçek Durum | 
|---|---|---|
|                              | **Eş Evrenler** | **Farklı Evrenler** |
| Eş Evrenler (H0 hipotezinin kabulü) | Doğru Karar | Hata   |
|Farklı Evrenler (H0 hipotezinin reddi) | Hata | Doğru Karar|
